<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Preferences</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #ccc;
    }

    .section {
      margin-bottom: 24px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .field label {
      flex: 1;
      color: #aaa;
    }

    .field input[type="time"] {
      padding: 6px 10px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #16213e;
      color: #eee;
      font-size: 13px;
      outline: none;
    }

    .field input[type="time"]:focus {
      border-color: #0f3460;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }

    .btn-primary {
      background: #0f3460;
      color: #eee;
    }

    .btn-primary:hover {
      background: #1a5276;
    }

    .btn-secondary {
      background: #333;
      color: #ccc;
    }

    .btn-secondary:hover {
      background: #444;
    }

    .status {
      margin-top: 8px;
      font-size: 11px;
      color: #4caf50;
      min-height: 16px;
    }

    .field-group {
      margin-bottom: 12px;
    }

    .field-group > label {
      display: block;
      color: #aaa;
      margin-bottom: 8px;
    }

    .time-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .time-row input[type="time"] {
      padding: 6px 10px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #16213e;
      color: #eee;
      font-size: 13px;
      outline: none;
    }

    .time-row input[type="time"]:focus {
      border-color: #0f3460;
    }

    .btn-remove {
      background: none;
      border: none;
      color: #e94560;
      font-size: 16px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .btn-remove:hover {
      background: rgba(233, 69, 96, 0.15);
    }

    .btn-add {
      background: none;
      border: 1px dashed #444;
      color: #aaa;
      font-size: 11px;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 4px;
      margin-top: 4px;
    }

    .btn-add:hover {
      border-color: #666;
      color: #eee;
    }

    hr {
      border: none;
      border-top: 1px solid #333;
      margin: 20px 0;
    }

    .description {
      font-size: 11px;
      color: #666;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="section">
    <h2>Working Hours</h2>
    <div class="field-group">
      <label>Auto-stop times</label>
      <div id="auto-stop-list"></div>
      <button class="btn-add" id="add-time-btn">+ Add time</button>
    </div>
    <div class="field">
      <label>Font size (px)</label>
      <input type="number" id="font-size" value="12" min="10" max="18" style="width:60px;padding:6px 10px;border:1px solid #333;border-radius:4px;background:#16213e;color:#eee;font-size:13px;outline:none;" />
    </div>
    <div class="field">
      <label>Always on top</label>
      <input type="checkbox" id="always-on-top" checked style="width:16px;height:16px;accent-color:#0f3460;" />
    </div>
    <div class="actions">
      <button class="btn-primary" id="save-btn">Save</button>
    </div>
    <div class="status" id="save-status"></div>
  </div>

  <hr />

  <div class="section">
    <h2>Export</h2>
    <p class="description">Download all time entries as a CSV file.</p>
    <div class="actions">
      <button class="btn-secondary" id="export-btn">Export CSV</button>
    </div>
    <div class="status" id="export-status"></div>
  </div>

  <script type="module">
    const { invoke } = window.__TAURI__.core;

    const autoStopList = document.getElementById("auto-stop-list");
    const addTimeBtn = document.getElementById("add-time-btn");
    const fontSizeInput = document.getElementById("font-size");
    const alwaysOnTopInput = document.getElementById("always-on-top");
    const saveBtn = document.getElementById("save-btn");
    const saveStatus = document.getElementById("save-status");
    const exportBtn = document.getElementById("export-btn");
    const exportStatus = document.getElementById("export-status");

    function addTimeRow(value = "17:00") {
      const row = document.createElement("div");
      row.className = "time-row";
      const input = document.createElement("input");
      input.type = "time";
      input.value = value;
      const removeBtn = document.createElement("button");
      removeBtn.className = "btn-remove";
      removeBtn.textContent = "×";
      removeBtn.addEventListener("click", () => row.remove());
      row.appendChild(input);
      row.appendChild(removeBtn);
      autoStopList.appendChild(row);
    }

    addTimeBtn.addEventListener("click", () => addTimeRow());

    // Load current settings
    async function loadSettings() {
      try {
        const settings = await invoke("get_settings");
        autoStopList.innerHTML = "";
        for (const t of settings.auto_stop_times) {
          addTimeRow(t);
        }
        fontSizeInput.value = settings.font_size;
        alwaysOnTopInput.checked = settings.always_on_top;
      } catch (e) {
        console.error("Failed to load settings:", e);
      }
    }

    // Save settings
    saveBtn.addEventListener("click", async () => {
      try {
        const fontSize = parseInt(fontSizeInput.value, 10) || 12;
        const alwaysOnTop = alwaysOnTopInput.checked;
        const times = [...autoStopList.querySelectorAll("input[type=time]")]
          .map(i => i.value)
          .filter(v => v);
        await invoke("save_settings", {
          settings: {
            auto_stop_times: times,
            font_size: fontSize,
            always_on_top: alwaysOnTop
          }
        });
        // Notify main window to apply changes immediately
        const { emit } = window.__TAURI__.event;
        await emit("settings-changed", { font_size: fontSize, always_on_top: alwaysOnTop });
        saveStatus.textContent = "✓ Saved";
        setTimeout(() => { saveStatus.textContent = ""; }, 2000);
      } catch (e) {
        saveStatus.textContent = "Error: " + e;
        saveStatus.style.color = "#e94560";
      }
    });

    // Export CSV
    exportBtn.addEventListener("click", async () => {
      try {
        const { save } = window.__TAURI__.dialog;
        const filePath = await save({
          defaultPath: `timetracked-${new Date().toISOString().split("T")[0]}.csv`,
          filters: [{ name: "CSV", extensions: ["csv"] }],
        });
        if (filePath) {
          await invoke("export_csv", { path: filePath });
          exportStatus.textContent = "✓ Exported";
          setTimeout(() => { exportStatus.textContent = ""; }, 2000);
        }
      } catch (e) {
        exportStatus.textContent = "Error: " + e;
        exportStatus.style.color = "#e94560";
      }
    });

    loadSettings();
  </script>
</body>
</html>
